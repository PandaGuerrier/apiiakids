services:
  pgsql:
    image: 'pgvector/pgvector:0.8.0-pg17'
    container_name: '${COMPOSE_PROJECT_NAME}_pgsql'
    ports:
      - '${PG_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${PG_PASSWORD:-secret}'
      POSTGRES_DB: '${PG_DB_NAME:-default}'
      POSTGRES_USER: '${PG_USER?:err}'
      POSTGRES_PASSWORD: '${PG_PASSWORD:-secret}'
    volumes:
      - 'sailpgsql:/var/lib/postgresql/data'
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-default}', '-U', '${PG_USER}']
      retries: 3
      timeout: 5s

networks:
  sail:
    driver: bridge

volumes:
  sailredis:
  sailpgsql:
